<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>{{ inviter_name }} te invitó a Muse</title>
</head>
<body style="margin:0;padding:0;background:#f6f3ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
	<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f3ee;padding:32px 0;">
		<tr><td align="center">
			<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:12px;padding:40px 32px;">
				<tr><td>
					<h1 style="margin:0 0 24px;font-size:28px;font-weight:700;color:#1a4d3e;">Muse</h1>
					<p style="margin:0 0 16px;font-size:16px;line-height:1.5;color:#1a1a1a;">Hola,</p>
					<p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#333;">
						<strong>{{ inviter_name }}</strong> te invitó a Muse, una app para descubrir y compartir restaurantes con amigos.
					</p>
					<p style="margin:32px 0;text-align:center;">
						<a href="{{ invitation_link }}" style="display:inline-block;background:#1a4d3e;color:#ffffff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:16px;">Registrate</a>
					</p>
					<p style="margin:0 0 16px;font-size:14px;line-height:1.5;color:#666;">
						Si el botón no funciona, copiá este link:<br>
						<a href="{{ invitation_link }}" style="color:#1a4d3e;word-break:break-all;">{{ invitation_link }}</a>
					</p>
					<p style="margin:24px 0 0;font-size:14px;line-height:1.5;color:#666;">
						Cuando te registres con este email, la amistad se creará automáticamente.
					</p>
					<p style="margin:32px 0 0;padding-top:16px;border-top:1px solid #eee;font-size:13px;color:#999;">— El equipo de Muse</p>
				</td></tr>
			</table>
		</td></tr>
	</table>
</body>
</html>
