[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = [
	"*/migrations/*",
	"staticfiles",
	"media",
]

[tool.ruff.lint]
select = [
	"E",    # pycodestyle errors
	"F",    # pyflakes
	"W",    # pycodestyle warnings
	"I",    # isort
	"N",    # pep8-naming
	"UP",   # pyupgrade
	"B",    # flake8-bugbear
	"A",    # flake8-builtins
	"C4",   # flake8-comprehensions
	"DTZ",  # flake8-datetimez (catches naive datetime.now())
	"T20",  # flake8-print (catches print() debug)
]
ignore = [
	"E501",  # line too long (handled by formatter when possible)
	"W191",  # indentation contains tabs (project convention is tabs)
	"E101",  # mixed spaces/tabs (false-positive against tab indentation)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["T20", "DTZ"]
"manage.py" = ["T20"]
"config/settings.py" = ["E402"]
"scripts/**/*.py" = ["T20"]

[tool.ruff.format]
quote-style = "double"
indent-style = "tab"
