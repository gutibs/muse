name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/muse
            git pull origin main
            sudo docker-compose -f docker-compose.aws.yml up --build -d
            sudo docker-compose -f docker-compose.aws.yml exec -T backend python manage.py migrate
