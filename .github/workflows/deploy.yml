name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'nginx/default-aws.conf'
      - 'nginx/Dockerfile.aws'
      - 'docker-compose.aws.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/muse
            git pull origin main

            # Backup DB before any restart. Keeps last 14 dumps.
            # Named volumes (muse_pgdata, muse_pgbackups) are preserved across down/up.
            if sudo docker-compose -f docker-compose.aws.yml ps -q db | grep -q .; then
              TS=$(date -u +%Y%m%d-%H%M%S)
              sudo docker-compose -f docker-compose.aws.yml exec -T db \
                sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB" | gzip > /backups/muse-'"$TS"'.sql.gz' || true
              sudo docker-compose -f docker-compose.aws.yml exec -T db \
                sh -c 'ls -1t /backups/muse-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f' || true
            fi

            # Bring everything down first (NEVER pass -v: that would delete the named volume).
            # docker-compose v1.29.2 has a recreate bug (KeyError: ContainerConfig) so we force
            # a clean down before up.
            sudo docker-compose -f docker-compose.aws.yml down --remove-orphans

            sudo docker-compose -f docker-compose.aws.yml up --build -d

            # Wait for db healthcheck before migrating
            for i in $(seq 1 30); do
              if sudo docker-compose -f docker-compose.aws.yml exec -T db sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' 2>/dev/null; then
                break
              fi
              sleep 2
            done

            # --fake-initial recovers from partial-schema state left by previous failed
            # deploys: tables that already exist get marked as migrated; missing ones
            # are created normally. Safe on clean DBs too.
            sudo docker-compose -f docker-compose.aws.yml exec -T backend python manage.py migrate --fake-initial
