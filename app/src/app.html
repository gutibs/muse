<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body>
		<div id="app" style="display: contents">%sveltekit.body%</div>
		<script>
			// Android WebView doesn't expose env(safe-area-inset-*) without
			// edge-to-edge native config. Force a 24px minimum on Android to
			// cover the gesture navigation bar.
			if (/Android/.test(navigator.userAgent)) {
				document.documentElement.style.setProperty('--sab', 'max(env(safe-area-inset-bottom, 0px), 24px)');
				document.documentElement.style.setProperty('--sat', 'max(env(safe-area-inset-top, 0px), 28px)');
			}
		</script>
	</body>
</html>
