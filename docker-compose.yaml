services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: muse_backend
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - muse_net

  nginx:
    image: nginx:alpine
    container_name: muse_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - muse_net

networks:
  muse_net:
    driver: bridge
