repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: check-no-silent-excepts
        name: check no silent excepts
        entry: python3 backend/scripts/check_no_silent_excepts.py
        language: system
        types: [python]
        files: ^backend/

      - id: check-no-console-log-in-source
        name: check no console.log in app/src
        entry: bash backend/scripts/check_no_console_log.sh
        language: system
        types_or: [javascript, ts, svelte]
        files: ^app/src/
