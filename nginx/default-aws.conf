# HTTP — ACME challenge + redirect
server {
	listen 80;
	server_name lovemuse.app www.lovemuse.app;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}

	location / {
		return 301 https://$host$request_uri;
	}
}

# HTTPS — API only
server {
	listen 443 ssl;
	server_name lovemuse.app www.lovemuse.app;

	ssl_certificate /etc/letsencrypt/live/lovemuse.app/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/lovemuse.app/privkey.pem;

	location /api/ {
		proxy_pass http://backend:8000;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /admin/ {
		proxy_pass http://backend:8000;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /static/ {
		alias /usr/share/nginx/static/;
	}

	# Legacy: emails enviados antes del 2026-05-09 apuntan a /register.
	# Mantener un 301 → / hasta que esos invites expiren.
	location = /register {
		return 301 /;
	}

	location = / {
		root /usr/share/nginx/landing;
		try_files /index.html =404;
		add_header Cache-Control "no-cache, must-revalidate" always;
	}

	location ~* ^/(logo\.png|qr-android\.png|legal\.css|i18n\.js)$ {
		root /usr/share/nginx/landing;
		expires 1d;
		add_header Cache-Control "public, max-age=86400" always;
		try_files $uri =404;
	}

	# Legal pages — served from the landing bundle.
	location ~* ^/(privacy|terms|community|cookies|contact)\.html$ {
		root /usr/share/nginx/landing;
		add_header Cache-Control "public, max-age=3600" always;
		try_files $uri =404;
	}

	location / {
		return 404;
	}
}
